version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: aether-api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - ml-core-sync
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aether-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # Helper container to ensure ml-core is available at build time if needed
  ml-core-sync:
    image: alpine:3.19
    command: ["sh", "-c", "mkdir -p /opt && sleep 1"]
    restart: "no"

networks:
  default:
    name: aether-network

