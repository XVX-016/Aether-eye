version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: aether-db
    environment:
      POSTGRES_DB: aether_eye
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
    ports:
      - "5432:5432"
    volumes:
      - aether-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether_eye"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: aether-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aether:aether@db:5432/aether_eye
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ml_core-sync:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aether-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  ml_core-sync:
    image: alpine:3.19
    command: ["sh", "-c", "mkdir -p /opt && sleep 1"]
    restart: "no"

networks:
  default:
    name: aether-network

volumes:
  aether-postgres:
