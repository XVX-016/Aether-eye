version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: aether-db
    environment:
      POSTGRES_DB: aether_eye
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether_eye"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aether-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://aether:aether@db:5432/aether_eye
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml_core/artifacts:/app/ml_core/artifacts:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aether-frontend
    environment:
      BACKEND_API_BASE_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
