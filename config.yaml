satellite_change:
  # Root directory containing before/after images and masks.
  # Override with SATELLITE_CHANGE_ROOT if needed.
  root: data/processed/change_detection
  # Text files listing before/after/mask triplets (relative to `root`).
  # Override with SATELLITE_CHANGE_TRAIN_LIST / SATELLITE_CHANGE_VAL_LIST.
  train_list: train_list.txt
  val_list: val_list.txt

aircraft_fgvc:
  # Root directory for FGVC Aircraft dataset.
  # Override with FGVC_AIRCRAFT_ROOT if needed.
  root: data/raw/aircraft
